<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>DSI Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#020617;
  color:white;
}

.header{
  background:#0f172a;
  padding:18px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

.nav{
  display:flex;
}

.nav button{
  flex:1;
  padding:14px;
  border:none;
  background:#1e293b;
  color:white;
  font-size:15px;
  font-weight:bold;
}

.nav button.active{
  background:#2563eb;
}

.page{
  display:none;
  padding:14px;
}

.page.active{
  display:block;
}

#reader{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  border:4px solid #22c55e;
  background:black;
}

#result,
#resultEstafet{
  margin-top:12px;
  padding:16px;
  border-radius:14px;
  background:#1e293b;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.scan-input{
  width:100%;
  margin-top:12px;
  padding:18px;
  border:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
  font-size:22px;
}

.filter-wrap{
  display:flex;
  gap:10px;
  margin-bottom:14px;
}

.filter-wrap select{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
  font-size:15px;
}

.dashboard-grid{
  display:grid;
  grid-template-columns:
    repeat(3,1fr);
  gap:12px;
}

.card{
  background:#1e293b;
  padding:16px;
  border-radius:18px;
}

.card-title{
  color:#94a3b8;
  font-size:13px;
  margin-bottom:8px;
}

.card-value{
  font-size:34px;
  font-weight:bold;
}

.blue{
  color:#60a5fa;
}

.green{
  color:#4ade80;
}

.red{
  color:#f87171;
}

.table-card{
  margin-top:16px;
  background:#1e293b;
  padding:16px;
  border-radius:18px;
  overflow:auto;
}

.area-table{
  width:100%;
  border-collapse:collapse;
}

.area-table th{
  background:#2563eb;
  padding:10px;
  font-size:13px;
}

.area-table td{
  background:#0f172a;
  padding:10px;
  text-align:center;
  border-bottom:1px solid #334155;
  font-size:13px;
}

.pending{
  color:#f87171;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
DSI SCANNER
</div>

<div class="nav">

<button class="active"
        onclick="showPage('scan',this)">
SCAN
</button>

<button onclick="showPage('estafet',this)">
ESTAFET
</button>

<button onclick="showPage('dashboard',this)">
DASHBOARD
</button>

</div>

<!-- =========================
SCAN
========================= -->

<div id="scan"
     class="page active">

<input type="text"
       id="scanInput"
       class="scan-input"
       placeholder="SCAN BARCODE"
       autofocus>

<div id="result">
READY SCAN
</div>

</div>

<!-- =========================
ESTAFET
========================= -->

<div id="estafet"
     class="page">

<div id="reader"></div>

<div id="resultEstafet">
LOADING CAMERA...
</div>

</div>

<!-- =========================
DASHBOARD
========================= -->

<div id="dashboard"
     class="page">

<div class="filter-wrap">

<select id="filterBranch"
        onchange="renderDashboard()">

<option value="ALL">
ALL BRANCH
</option>

<option value="HG">
HG
</option>

<option value="BK">
BK
</option>

</select>

<select id="filterArea"
        onchange="renderDashboard()">

<option value="ALL">
ALL AREA
</option>

</select>

<select id="filterMenu"
        onchange="renderDashboard()">

<option value="ALL">
ALL MENU
</option>

<option value="Lunch">
Lunch
</option>

<option value="Dinner">
Dinner
</option>

</select>

</div>

<div class="dashboard-grid">

<div class="card">
<div class="card-title">
QTY BOX
</div>
<div class="card-value blue"
     id="totalQty">
0
</div>
</div>

<div class="card">
<div class="card-title">
QTY SCANNED
</div>
<div class="card-value green"
     id="scannedQty">
0
</div>
</div>

<div class="card">
<div class="card-title">
QTY PENDING
</div>
<div class="card-value red"
     id="pendingQty">
0
</div>
</div>

</div>

<div class="table-card">

<table class="area-table">

<thead>

<tr>

<th>AREA</th>
<th>BRANCH</th>
<th>KODE WARNA</th>
<th>QTY</th>
<th>SCANNED</th>
<th>PENDING</th>

</tr>

</thead>

<tbody id="areaTable">
</tbody>

</table>

</div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbwSD3xJ295OWhgS18__nAjQIwoLjx8ZtPtDGUeAY5FPCOZvj7_q6qL1n_s9iPs2a9ny/exec";

let dashboardData =
  null;

let scanner;

let lastScan = "";

// =====================================
// NAVIGATION
// =====================================

function showPage(page,btn){

  document
    .querySelectorAll(".page")
    .forEach(p => {
      p.classList.remove("active");
    });

  document
    .getElementById(page)
    .classList.add("active");

  document
    .querySelectorAll(".nav button")
    .forEach(b => {
      b.classList.remove("active");
    });

  btn.classList.add("active");

  if(page == "dashboard"){
    loadDashboard();
  }

  if(page == "estafet"){

    if(!scanner){
      startScanner();
    }

  }

}

// =====================================
// STATUS
// =====================================

function updateStatus(
  elementId,
  text
){

  const el =
    document
      .getElementById(
        elementId
      );

  el.innerHTML = text;

  el.style.color =
    "white";

  el.style.background =
    "#1e293b";

  if(
    text.includes(
      "BERHASIL"
    )
  ){

    el.style.color =
      "#4ade80";

    el.style.background =
      "#052e16";

  }

  else if(

    text.includes(
      "TIDAK"
    ) ||

    text.includes(
      "SUDAH"
    ) ||

    text.includes(
      "ERROR"
    )

  ){

    el.style.color =
      "#f87171";

    el.style.background =
      "#450a0a";

  }

}

// =====================================
// PROCESS SCAN
// =====================================

function processScan(
  barcode,
  type,
  resultId,
  inputId
){

  if(
    !barcode ||
    barcode == lastScan
  ){
    return;
  }

  lastScan = barcode;

  fetch(WEB_APP_URL,{

    method:"POST",

    headers:{
      "Content-Type":
      "text/plain"
    },

    body:JSON.stringify({

      boxId:barcode,

      type:type

    })

  })

  .then(res => res.text())

  .then(data => {

    updateStatus(
      resultId,
      data
    );

    if(inputId){

      document
        .getElementById(
          inputId
        ).value = "";

      document
        .getElementById(
          inputId
        ).focus();

    }

    setTimeout(()=>{

      lastScan = "";

    },1000);

  })

  .catch(err => {

    updateStatus(
      resultId,
      err
    );

  });

}

// =====================================
// INPUT SCAN
// =====================================

document
.getElementById(
  "scanInput"
)
.addEventListener(
"keydown",
function(e){

if(e.key === "Enter"){

processScan(
this.value.trim(),
"scan",
"result",
"scanInput"
);

}

}
);

// =====================================
// CAMERA ESTAFET
// =====================================

function startScanner(){

  scanner =
    new Html5Qrcode(
      "reader"
    );

  scanner.start(

    {
      facingMode:
      "environment"
    },

    {
      fps:10,
      qrbox:250
    },

    (decodedText)=>{

      processScan(
        decodedText,
        "estafet",
        "resultEstafet"
      );

    }

  )
  .then(()=>{

    updateStatus(
      "resultEstafet",
      "CAMERA READY"
    );

  })
  .catch(err=>{

    updateStatus(
      "resultEstafet",
      "ERROR CAMERA"
    );

  });

}

// =====================================
// LOAD DASHBOARD
// =====================================

async function loadDashboard(){

  try{

    const res =
      await fetch(
        WEB_APP_URL +
        "?dashboard=1"
      );

    dashboardData =
      await res.json();

    populateAreaFilter();

    renderDashboard();

  }

  catch(err){

    console.log(err);

  }

}

// =====================================
// POPULATE AREA
// =====================================

function populateAreaFilter(){

  const areaSelect =
    document
      .getElementById(
        "filterArea"
      );

  const current =
    areaSelect.value;

  const areas =
    [...new Set(

      dashboardData
      .areas
      .map(a=>a.area)

    )].sort();

  areaSelect.innerHTML =
    `<option value="ALL">
      ALL AREA
    </option>`;

  areas.forEach(a=>{

    areaSelect.innerHTML += `

      <option value="${a}">
        ${a}
      </option>

    `;

  });

  areaSelect.value =
    current || "ALL";

}

// =====================================
// RENDER DASHBOARD
// =====================================

function renderDashboard(){

  if(!dashboardData){
    return;
  }

  const branch =
    document
      .getElementById(
        "filterBranch"
      ).value;

  const area =
    document
      .getElementById(
        "filterArea"
      ).value;

  const menu =
    document
      .getElementById(
        "filterMenu"
      ).value;

  let filtered =
    dashboardData.areas;

  if(branch != "ALL"){

    filtered =
      filtered.filter(
        a =>
        a.branch ==
        branch
      );

  }

  if(area != "ALL"){

    filtered =
      filtered.filter(
        a =>
        a.area ==
        area
      );

  }

  if(menu != "ALL"){

    filtered =
      filtered.filter(
        a =>
        a.menu ==
        menu
      );

  }

  let qty = 0;
  let scanned = 0;
  let pending = 0;

  filtered.forEach(a=>{

    qty += a.qty;
    scanned += a.scanned;
    pending += a.pending;

  });

  document
    .getElementById(
      "totalQty"
    ).innerHTML = qty;

  document
    .getElementById(
      "scannedQty"
    ).innerHTML = scanned;

  document
    .getElementById(
      "pendingQty"
    ).innerHTML = pending;

  filtered.sort((a,b)=>{

    if(a.area < b.area)
      return -1;

    if(a.area > b.area)
      return 1;

    if(
      a.kodeWarna <
      b.kodeWarna
    )
      return -1;

    if(
      a.kodeWarna >
      b.kodeWarna
    )
      return 1;

    return 0;

  });

  let html = "";

  filtered.forEach(a=>{

    html += `

    <tr>

      <td>${a.area}</td>

      <td>${a.branch}</td>

      <td>${a.kodeWarna}</td>

      <td>${a.qty}</td>

      <td>${a.scanned}</td>

      <td class="pending">
        ${a.pending}
      </td>

    </tr>

    `;

  });

  document
    .getElementById(
      "areaTable"
    ).innerHTML = html;

}

loadDashboard();

setInterval(
  loadDashboard,
  5000
);

</script>

</body>
</html>
