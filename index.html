<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>DSI Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#020617;
  color:white;
}

.header{
  background:#0f172a;
  padding:18px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
}

.nav{
  display:flex;
}

.nav button{
  flex:1;
  padding:16px;
  border:none;
  background:#1e293b;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.nav button.active{
  background:#2563eb;
}

.page{
  display:none;
  padding:16px;
}

.page.active{
  display:block;
}

/* =========================
SCAN INPUT
========================= */

.scan-input{
  width:100%;
  padding:24px;
  border:none;
  border-radius:18px;
  background:#1e293b;
  color:white;
  font-size:28px;
  outline:none;
}

/* =========================
CAMERA
========================= */

#reader{
  width:100%;
  border-radius:20px;
  overflow:hidden;
  border:4px solid #22c55e;
  background:black;
}

/* =========================
RESULT
========================= */

#result,
#resultEstafet{

  margin-top:16px;

  padding:20px;

  border-radius:18px;

  text-align:center;

  font-size:26px;

  font-weight:bold;

  background:#1e293b;

  transition:0.2s;

}

.success{
  background:#052e16 !important;
  color:#4ade80 !important;
}

.error{
  background:#450a0a !important;
  color:#f87171 !important;
}

</style>

</head>

<body>

<div class="header">
DSI SCANNER
</div>

<div class="nav">

<button class="active"
        onclick="showPage('scan',this)">
SCAN
</button>

<button onclick="showPage('estafet',this)">
ESTAFET
</button>

</div>

<!-- =========================
SCAN
========================= -->

<div id="scan"
     class="page active">

<input type="text"
       id="scanInput"
       class="scan-input"
       placeholder="SCAN BARCODE"
       autofocus>

<div id="result">
READY SCAN
</div>

</div>

<!-- =========================
ESTAFET
========================= -->

<div id="estafet"
     class="page">

<div id="reader"></div>

<div id="resultEstafet">
LOADING CAMERA...
</div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbzKa9a-9N0Cd0TZxuSPKtbG5N5IYSwL2lgsw4bwFDIfcmxILieZNkzXgNpsRiPYEQPW/exec";

let scanner;

let lastScan = "";

// =====================================
// NAVIGATION
// =====================================

function showPage(page,btn){

  document
    .querySelectorAll(".page")
    .forEach(p => {
      p.classList.remove("active");
    });

  document
    .getElementById(page)
    .classList.add("active");

  document
    .querySelectorAll(".nav button")
    .forEach(b => {
      b.classList.remove("active");
    });

  btn.classList.add("active");

  // START CAMERA
  if(page == "estafet"){

    if(!scanner){

      startScanner();

    }

  }

}

// =====================================
// UPDATE STATUS
// =====================================

function updateStatus(
  elementId,
  text,
  success = true
){

  const el =
    document
      .getElementById(
        elementId
      );

  el.innerHTML = text;

  el.classList.remove(
    "success"
  );

  el.classList.remove(
    "error"
  );

  if(success){

    el.classList.add(
      "success"
    );

  }

  else{

    el.classList.add(
      "error"
    );

  }

}

// =====================================
// AUTO RESET STATUS
// =====================================

function resetStatus(
  elementId,
  text
){

  setTimeout(()=>{

    const el =
      document
        .getElementById(
          elementId
        );

    el.innerHTML = text;

    el.classList.remove(
      "success"
    );

    el.classList.remove(
      "error"
    );

  },1000);

}

// =====================================
// PROCESS SCAN
// =====================================

function processScan(
  barcode,
  type,
  resultId,
  inputId
){

  if(
    !barcode ||
    barcode == lastScan
  ){
    return;
  }

  lastScan = barcode;

  fetch(WEB_APP_URL,{

    method:"POST",

    headers:{
      "Content-Type":
      "text/plain"
    },

    body:JSON.stringify({

      boxId:barcode,

      type:type

    })

  })

  .then(res => res.text())

  .then(data => {

    // SUCCESS
    updateStatus(
      resultId,
      data,
      true
    );

    // RESET INPUT
    if(inputId){

      const input =
        document
          .getElementById(
            inputId
          );

      input.value = "";

      input.focus();

    }

    // AUTO RESET
    resetStatus(
      resultId,
      "READY SCAN"
    );

    // UNLOCK SCAN
    setTimeout(()=>{

      lastScan = "";

    },300);

  })

  .catch(err => {

    updateStatus(
      resultId,
      "ERROR",
      false
    );

    resetStatus(
      resultId,
      "READY SCAN"
    );

  });

}

// =====================================
// INPUT SCAN
// =====================================

document
.getElementById(
  "scanInput"
)
.addEventListener(
"keydown",
function(e){

if(e.key === "Enter"){

processScan(
this.value.trim(),
"scan",
"result",
"scanInput"
);

}

}
);

// =====================================
// CAMERA ESTAFET
// =====================================

function startScanner(){

  scanner =
    new Html5Qrcode(
      "reader"
    );

  scanner.start(

    {
      facingMode:
      "environment"
    },

    {
      fps:20,
      qrbox:250
    },

    (decodedText)=>{

      processScan(
        decodedText,
        "estafet",
        "resultEstafet"
      );

    }

  )
  .then(()=>{

    updateStatus(
      "resultEstafet",
      "CAMERA READY",
      true
    );

  })
  .catch(()=>{

    updateStatus(
      "resultEstafet",
      "ERROR CAMERA",
      false
    );

  });

}

</script>

</body>
</html>
